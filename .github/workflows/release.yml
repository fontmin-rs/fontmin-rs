name: Release

permissions:
  id-token: write
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build_args: --use-napi-cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build_args: --cross-compile
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
        if: matrix.build_args == '--cross-compile'
        with:
          version: 0.15.2
      - uses: taiki-e/install-action@v2
        if: matrix.build_args == '--cross-compile'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fontmin-rs/binding build --target ${{ matrix.target }} ${{ matrix.build_args }}
      - run: pnpm --filter @fontmin-rs/binding artifacts
      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: npm/**/*.node
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [build-native]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          pattern: bindings-*
          merge-multiple: true
      - name: Place downloaded native artifacts
        run: |
          shopt -s nullglob

          for dir in binding-*; do
            cp -R "$dir"/. "npm/$dir"/
          done
      - name: Verify native package artifacts
        run: |
          node --input-type=module <<'EOF'
          import { existsSync, readdirSync, readFileSync } from 'node:fs'
          import { join } from 'node:path'

          const missing = []

          for (const entry of readdirSync('npm', { withFileTypes: true })) {
            if (!entry.isDirectory()) {
              continue
            }

            const packageDir = join('npm', entry.name)
            const manifest = JSON.parse(
              readFileSync(join(packageDir, 'package.json'), 'utf8'),
            )

            for (const file of manifest.files ?? []) {
              if (!existsSync(join(packageDir, file))) {
                missing.push(`${manifest.name}: ${file}`)
              }
            }
          }

          if (missing.length > 0) {
            console.error(`Missing native artifacts:\n${missing.join('\n')}`)
            process.exit(1)
          }
          EOF
      - run: pnpm --filter fontmin-rs build
      - run: pnpm --filter @fontmin-rs/wasm build
      - run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm install -g npm@latest
      - run: pnpm -r publish --no-git-checks --access public --report-summary
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
