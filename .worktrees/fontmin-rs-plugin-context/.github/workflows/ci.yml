name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck

  test:
    runs-on: ${{ matrix.os }}
    needs: [check]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22.x, 24.x, 26.x]
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fontmin-rs/binding build:debug
      - run: pnpm run build
      - run: pnpm run test

  bench:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fontmin-rs/binding build:debug
      - run: pnpm --filter fontmin-rs bench

  build-native:
    runs-on: ${{ matrix.os }}
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fontmin-rs/binding build --target ${{ matrix.target }}
      - run: pnpm --filter @fontmin-rs/binding artifacts
      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: |
            napi/fontmin/src-js/*.node
            npm/**/*.node
          if-no-files-found: error
