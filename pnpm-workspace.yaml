packages:
  - docs
  - packages/*
  - napi/*
  - npm/*
  - wasm/*
  - tasks/*
  - examples/*

allowBuilds:
  '@napi-rs/cli': true
  ttf2woff2: false

minimumReleaseAgeExclude:
  - '@napi-rs/*'
  - '@emnapi/*'
  - fontmin-rs

catalog:
  '@napi-rs/cli': ^3.7.2
  '@types/node': ^26.1.1
  tsdown: ^0.22.4
  typescript: ^7.0.2
  vitest: ^4.1.10

minimumReleaseAge: 0
ignoreWorkspaceRootCheck: true
packageManagerStrict: false
shellEmulator: true
